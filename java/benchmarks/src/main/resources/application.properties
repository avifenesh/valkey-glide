# Spring Boot Application properties for Valkey GLIDE benchmarking

# Server configuration
server.port=8080
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.max-connections=1000

# Valkey connection settings
valkey.host=${VALKEY_HOST:localhost}
valkey.port=${VALKEY_PORT:6379}
valkey.use-ssl=${VALKEY_USE_SSL:false}
valkey.cluster-mode=${VALKEY_CLUSTER_MODE:true}
valkey.timeout=${VALKEY_TIMEOUT:1000}
valkey.connect-timeout=${VALKEY_CONNECT_TIMEOUT:10000}
valkey.idle-connect-timeout=${VALKEY_IDLE_CONNECT_TIMEOUT:1000}
valkey.master-connections-min-idle=${VALKEY_MASTER_MIN_IDLE:10}
valkey.master-connections-pool-size=${VALKEY_MASTER_POOL_SIZE:24}
valkey.slave-connections-min-idle=${VALKEY_SLAVE_MIN_IDLE:10}
valkey.slave-connections-pool-size=${VALKEY_SLAVE_POOL_SIZE:24}
valkey.retry-attempts=${VALKEY_RETRY_ATTEMPTS:3}
valkey.retry-interval=${VALKEY_RETRY_INTERVAL:1000}

# Redis connection settings
redis.host=${REDIS_HOST:localhost}
redis.port=${REDIS_PORT:6379}
redis.use-ssl=${REDIS_USE_SSL:false}
redis.cluster-mode=${REDIS_CLUSTER_MODE:true}
redis.timeout=${REDIS_TIMEOUT:1000}
redis.connect-timeout=${REDIS_CONNECT_TIMEOUT:10000}
redis.idle-connect-timeout=${REDIS_IDLE_CONNECT_TIMEOUT:1000}
redis.master-connections-min-idle=${REDIS_MASTER_MIN_IDLE:10}
redis.master-connections-pool-size=${REDIS_MASTER_POOL_SIZE:24}
redis.slave-connections-min-idle=${REDIS_SLAVE_MIN_IDLE:10}
redis.slave-connections-pool-size=${REDIS_SLAVE_POOL_SIZE:24}
redis.retry-attempts=${REDIS_RETRY_ATTEMPTS:3}
redis.retry-interval=${REDIS_RETRY_INTERVAL:1000}

# Benchmark settings
benchmark.populate.keys=${BENCHMARK_POPULATE_KEYS:500000}
benchmark.populate.threads=${BENCHMARK_POPULATE_THREADS:16}
benchmark.populate.batch-size=${BENCHMARK_POPULATE_BATCH_SIZE:1000}
benchmark.populate.word-count=${BENCHMARK_POPULATE_WORD_COUNT:30}
benchmark.populate.enabled=${BENCHMARK_POPULATE_ENABLED:false}
benchmark.populate.client=${BENCHMARK_POPULATE_CLIENT:glide}

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always

# Logging configuration
logging.level.root=INFO
logging.level.glide.benchmarks=INFO
logging.level.org.springframework.web=INFO

# Prometheus metrics
management.metrics.export.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.sla.http.server.requests=100ms, 500ms, 1s

# Native library loading configuration
native.library.path=${NATIVE_LIB_PATH:src/main/resources/glide/benchmarks/libs/native}
