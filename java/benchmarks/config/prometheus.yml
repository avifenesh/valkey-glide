# Prometheus configuration for Valkey GLIDE benchmark

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'benchmark-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['benchmark-app:8080']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
