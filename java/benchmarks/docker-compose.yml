version: '3'

services:
  # Valkey GLIDE benchmark application
  benchmark-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Valkey settings
      - VALKEY_HOST=${VALKEY_HOST:-localhost}
      - VALKEY_PORT=${VALKEY_PORT:-6379}
      - VALKEY_USE_SSL=${VALKEY_USE_SSL:-false}
      - VALKEY_CLUSTER_MODE=${VALKEY_CLUSTER_MODE:-true}
      - VALKEY_TIMEOUT=${VALKEY_TIMEOUT:-1000}
      - VALKEY_CONNECT_TIMEOUT=${VALKEY_CONNECT_TIMEOUT:-10000}
      - VALKEY_MASTER_MIN_IDLE=${VALKEY_MASTER_MIN_IDLE:-10}
      - VALKEY_MASTER_POOL_SIZE=${VALKEY_MASTER_POOL_SIZE:-24}
      - VALKEY_SLAVE_MIN_IDLE=${VALKEY_SLAVE_MIN_IDLE:-10}
      - VALKEY_SLAVE_POOL_SIZE=${VALKEY_SLAVE_POOL_SIZE:-24}
      - VALKEY_RETRY_ATTEMPTS=${VALKEY_RETRY_ATTEMPTS:-3}
      - VALKEY_RETRY_INTERVAL=${VALKEY_RETRY_INTERVAL:-1000}
      - VALKEY_IDLE_CONNECT_TIMEOUT=${VALKEY_IDLE_CONNECT_TIMEOUT:-1000}
      
      # Redis settings
      - REDIS_HOST=${REDIS_HOST:-localhost}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_USE_SSL=${REDIS_USE_SSL:-false}
      - REDIS_CLUSTER_MODE=${REDIS_CLUSTER_MODE:-true}
      - REDIS_TIMEOUT=${REDIS_TIMEOUT:-1000}
      - REDIS_CONNECT_TIMEOUT=${REDIS_CONNECT_TIMEOUT:-10000}
      - REDIS_MASTER_MIN_IDLE=${REDIS_MASTER_MIN_IDLE:-10}
      - REDIS_MASTER_POOL_SIZE=${REDIS_MASTER_POOL_SIZE:-24}
      - REDIS_SLAVE_MIN_IDLE=${REDIS_SLAVE_MIN_IDLE:-10}
      - REDIS_SLAVE_POOL_SIZE=${REDIS_SLAVE_POOL_SIZE:-24}
      - REDIS_RETRY_ATTEMPTS=${REDIS_RETRY_ATTEMPTS:-3}
      - REDIS_RETRY_INTERVAL=${REDIS_RETRY_INTERVAL:-1000}
      - REDIS_IDLE_CONNECT_TIMEOUT=${REDIS_IDLE_CONNECT_TIMEOUT:-1000}
      
      # Benchmark settings
      - BENCHMARK_POPULATE_ENABLED=${BENCHMARK_POPULATE_ENABLED:-true}
      - BENCHMARK_POPULATE_KEYS=${BENCHMARK_POPULATE_KEYS:-500000}
      - BENCHMARK_POPULATE_THREADS=${BENCHMARK_POPULATE_THREADS:-16}
      - BENCHMARK_POPULATE_BATCH_SIZE=${BENCHMARK_POPULATE_BATCH_SIZE:-1000}
      - BENCHMARK_POPULATE_WORD_COUNT=${BENCHMARK_POPULATE_WORD_COUNT:-30}
      - BENCHMARK_POPULATE_CLIENT=${BENCHMARK_POPULATE_CLIENT:-glide}
      
      # Spring profile
      - SPRING_PROFILES_ACTIVE=populate
    networks:
      - benchmark-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.48.0
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - benchmark-network
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.2.3
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./config/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./config/dashboards:/var/lib/grafana/dashboards
    networks:
      - benchmark-network
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  benchmark-network:
    driver: bridge
