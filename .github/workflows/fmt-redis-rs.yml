# Nightly full-matrix tests for the Redis-RS client.
# Thin wrapper around redis-rs.yml that isolates scheduling so per-language
# full-matrix runs can be staggered and failures do not cascade across
# languages. Flaky-test isolation work: see #4629.
name: FMT Redis-RS

permissions:
    contents: read
    actions: write

on:
    # Nightly at 02:30 UTC.
    schedule:
        - cron: "30 2 * * *"
    workflow_dispatch:

concurrency:
    group: fmt-redis-rs-${{ github.ref }}
    cancel-in-progress: true

jobs:
    run-fmt-redis-rs:
        if: github.repository_owner == 'valkey-io'
        uses: ./.github/workflows/redis-rs.yml
        name: FMT - Redis-RS
        secrets: inherit
